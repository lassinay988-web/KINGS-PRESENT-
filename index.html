<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORACXPRED - Prédictions FIFA IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #0b1020, #071028);
            color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .container { text-align: center; padding: 40px 20px; max-width: 600px; }
        .logo { font-size: 3rem; font-weight: bold; margin-bottom: 20px; }
        .logo span { color: #00d4ff; }
        h1 { font-size: 2.5rem; margin-bottom: 20px; }
        p { font-size: 1.2rem; margin-bottom: 30px; opacity: 0.9; }
        .cta-button {
            background: linear-gradient(135deg, #00d4ff, #7efc6b);
            color: black; padding: 15px 30px; border-radius: 10px;
            text-decoration: none; font-weight: bold; display: inline-block;
            margin: 10px; border: none; cursor: pointer;
        }
        .countdown { margin: 30px 0; font-size: 1.5rem; }
        .features { display: flex; justify-content: center; gap: 20px; margin: 30px 0; flex-wrap: wrap; }
        .feature { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGO CORRIGÉ -->
        <div class="logo">ORAC<span>XPRED</span></div>
        <h1>Prédictions Intelligentes FIFA</h1>
        <p>La révolution des prédictions IA pour le sport virtuel arrive bientôt</p>
        
        <div class="features">
            <div class="feature">🎯 Victoires Prédites</div>
            <div class="feature">⚽ Scores Exactes</div>
            <div class="feature">🧠 IA Multi-Niveaux</div>
        </div>
        
        <div class="countdown" id="countdown">
            Lancement dans: <span id="timer">7</span> jours
        </div>
        
        <a href="#waitlist" class="cta-button">Rejoindre la Liste d'Attente</a>
        
        <!-- EMAIL CORRIGÉ - kingsaddes@gmail.com -->
        <button class="cta-button" onclick="showContact()">Contact Rapide</button>
        
        <div id="waitlist" style="margin-top: 40px; display: none;">
            <h3>🚀 Soyez parmi les premiers</h3>
            <form onsubmit="submitForm(event)" style="margin-top: 20px;">
                <input type="email" placeholder="Votre email" required 
                       style="padding: 12px; width: 300px; border-radius: 8px; border: none; margin-right: 10px;">
                <button type="submit" style="padding: 12px 20px; background: #7efc6b; color: black; border: none; border-radius: 8px; cursor: pointer;">
                    Valider
                </button>
            </form>
        </div>
    </div>

    <script>
        // FONCTION CONTACT AVEC VOTRE EMAIL
        function showContact() {
            window.location.href = 'mailto:kingsaddes@gmail.com?subject=ORACXPRED - Contact&body=Bonjour, je suis intéressé par ORACXPRED!';
        }
        
        function submitForm(e) {
            e.preventDefault();
            const email = e.target.querySelector('input[type="email"]').value;
            alert('Merci! Nous vous contacterons très vite à: ' + email);
            // Ici vous pouvez ajouter l'envoi vers kingsaddes@gmail.com
            e.target.reset();
        }
        
        // Compte à rebours
        let days = 7;
        setInterval(() => {
            days = Math.max(0, days - 0.0001);
            document.getElementById('timer').textContent = Math.ceil(days);
        }, 1000);
        
        // Afficher le formulaire quand on clique sur le bouton
        document.querySelector('a[href="#waitlist"]').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('waitlist').style.display = 'block';
        });
    </script>
</body>
</html>
